services:
  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - IPFS_RPC_HOST=http://ipfs
      - IPFS_RPC_PORT=5001
    depends_on:
      - ipfs

volumes:
  ipfs_data:

